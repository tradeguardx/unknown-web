# fly.toml — Fly.io deploy config for unknown-web
# https://fly.io/docs/reference/configuration/

app = 'unknown-web'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  HOSTNAME = '0.0.0.0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
