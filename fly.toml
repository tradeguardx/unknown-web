# fly.toml — Fly.io deploy config for unknown-web
# https://fly.io/docs/reference/configuration/

app = 'unknown-web'
primary_region = 'ams'

[build]
  # Public client-side env vars baked into the Next.js bundle at build time.
  # These aren't secrets (the values ship to every browser anyway) so it's fine
  # to have them in source control. Anything actually secret stays in
  # `fly secrets set ...` and is only available at runtime.
  [build.args]
    # Cloudflare Turnstile site key — public (ships to every browser as a
    # data-sitekey attribute). The matching SECRET key stays in Fly secrets
    # via `fly secrets set TURNSTILE_SECRET_KEY=...`.
    NEXT_PUBLIC_TURNSTILE_SITE_KEY = '0x4AAAAAADMu8IXXDJC0QmtQ'
    # Sentry — DSN is public (ships in the client bundle). Org/project are used
    # only to upload source maps at build time. The matching SENTRY_AUTH_TOKEN
    # is a secret and is passed by CI as a --build-arg (see .github/workflows),
    # never committed here. Fill these in from sentry.io after creating the
    # Next.js project.
    NEXT_PUBLIC_SENTRY_DSN = 'https://13224c6e43545ca6f3fecc9c7fd9a2e0@o4511279556919296.ingest.de.sentry.io/4511536155328592'
    SENTRY_ORG = 'rdx'
    SENTRY_PROJECT = 'unknown-nextjs'
    # Supabase (match / unknown plus) — URL + anon/publishable key are public.
    NEXT_PUBLIC_SUPABASE_URL = 'https://eppdibglxxapupwgssxu.supabase.co'
    NEXT_PUBLIC_SUPABASE_ANON_KEY = 'sb_publishable_oTj42nfSRNLidR1L4EcksA_CuAeVurQ'
    NEXT_PUBLIC_MATCH_API_URL = 'https://api.unknown.chat/match'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  HOSTNAME = '0.0.0.0'
  NEXT_PUBLIC_TURNSTILE_SITE_KEY = '0x4AAAAAADMu8IXXDJC0QmtQ'

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine deploy (sessions are in-process memory, not Redis).
  # Don't auto-stop or it loses sessions; don't scale beyond 1 machine.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
