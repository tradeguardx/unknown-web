# fly.toml — Fly.io deploy config for unknown-web
# https://fly.io/docs/reference/configuration/

app = 'unknown-web'
primary_region = 'ams'

[build]
  # Public client-side env vars baked into the Next.js bundle at build time.
  # These aren't secrets (the values ship to every browser anyway) so it's fine
  # to have them in source control. Anything actually secret stays in
  # `fly secrets set ...` and is only available at runtime.
  [build.args]
    NEXT_PUBLIC_PLAUSIBLE_DOMAIN = 'unknown.chat'
    # Plausible's per-site tracker URL (legacy /js/script.js is being sunset).
    # Get this value from Plausible dashboard → Site Settings → Site Settings →
    # Installation, or from the install page snippet.
    NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL = 'https://plausible.io/js/pa-nvCUS5xERM02jG1yxKvD6.js'
    # Cloudflare Turnstile site key — public (ships to every browser as a
    # data-sitekey attribute). The matching SECRET key stays in Fly secrets
    # via `fly secrets set TURNSTILE_SECRET_KEY=...`.
    NEXT_PUBLIC_TURNSTILE_SITE_KEY = '0x4AAAAAADMu8IXXDJC0QmtQ'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  HOSTNAME = '0.0.0.0'
  # Mirror the build-args so server-side code (lib/analytics.ts) can read
  # them at runtime via process.env without depending on Fly secrets.
  NEXT_PUBLIC_PLAUSIBLE_DOMAIN = 'unknown.chat'
  NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL = 'https://plausible.io/js/pa-nvCUS5xERM02jG1yxKvD6.js'
  NEXT_PUBLIC_TURNSTILE_SITE_KEY = '0x4AAAAAADMu8IXXDJC0QmtQ'

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine deploy (sessions are in-process memory, not Redis).
  # Don't auto-stop or it loses sessions; don't scale beyond 1 machine.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
