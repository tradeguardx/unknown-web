name: fly-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: deploy to fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group  # serialize, no parallel deploys
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # SENTRY_AUTH_TOKEN is passed as a build-arg so Sentry can upload source
      # maps for readable stack traces. It's a repo secret (Settings → Secrets
      # and variables → Actions), never committed. Builds still work if unset.
      - run: flyctl deploy --remote-only --build-arg SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
